<html lang="es">

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Super RP — Checklist</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0a0900;
  --bg2:#100e00;
  --bg3:#1a1600;
  --bg4:#221e00;
  --accent:#d4a017;
  --accent2:#f5c842;
  --border:#d4a01714;
  --border2:#d4a01730;
  --text:#f5f0e0;
  --muted:#8a7a50;
  --font:'Rajdhani',sans-serif;
  --mono:'Share Tech Mono',monospace;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:var(--font);min-height:100vh;overflow-x:hidden}
body::before{
  content:'';position:fixed;inset:0;
  background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);
  background-size:40px 40px;pointer-events:none;z-index:0
}
.wrap{position:relative;z-index:1;max-width:900px;margin:0 auto;padding:2rem 1.5rem 4rem}

/* Connection status */
.conn-bar{
  position:fixed;top:0;left:0;right:0;z-index:100;
  display:flex;align-items:center;justify-content:center;gap:8px;
  padding:6px;font-family:var(--mono);font-size:11px;letter-spacing:2px;
  text-transform:uppercase;transition:all .3s
}
.conn-bar.connecting{background:#1a1200;color:var(--muted)}
.conn-bar.online{background:#0a1200;color:#7dcc50}
.conn-bar.offline{background:#1a0000;color:#cc5050}
.conn-dot{width:7px;height:7px;border-radius:50%;background:currentColor;animation:blink 1.5s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}

/* Who's online */
.online-bar{
  background:var(--bg3);border:1px solid var(--border2);
  padding:.6rem 1rem;margin-bottom:1.2rem;
  display:flex;align-items:center;gap:10px;flex-wrap:wrap
}
.online-label{font-family:var(--mono);font-size:11px;color:var(--muted);letter-spacing:2px;text-transform:uppercase}
.avatars{display:flex;gap:6px;flex-wrap:wrap;flex:1}
.avatar{
  width:28px;height:28px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:11px;font-weight:700;border:2px solid var(--accent);
  background:var(--bg4);color:var(--accent2);font-family:var(--mono);
  position:relative
}
.avatar[data-you="true"]::after{
  content:'tú';position:absolute;bottom:-14px;left:50%;transform:translateX(-50%);
  font-size:9px;color:var(--accent);white-space:nowrap
}
.name-setup{
  background:var(--bg3);border:1px solid var(--border2);
  padding:1.5rem;text-align:center;margin-bottom:1.5rem
}
.name-setup p{font-size:14px;color:var(--muted);margin-bottom:1rem;font-family:var(--mono)}
.name-input-row{display:flex;gap:8px;justify-content:center;flex-wrap:wrap}
.name-input{
  background:var(--bg4);border:1px solid var(--border2);color:var(--text);
  font-family:var(--mono);font-size:14px;padding:8px 14px;outline:none;width:200px
}
.name-input:focus{border-color:var(--accent)}
.name-btn{
  background:var(--accent);border:none;color:#0a0900;
  font-family:var(--font);font-size:14px;font-weight:700;
  padding:8px 20px;cursor:pointer;letter-spacing:1px;text-transform:uppercase;
  transition:background .2s
}
.name-btn:hover{background:var(--accent2)}

/* Activity feed */
.feed{
  background:var(--bg2);border:1px solid var(--border);
  max-height:120px;overflow-y:auto;margin-bottom:1.2rem;
  padding:.5rem .75rem
}
.feed-item{
  font-family:var(--mono);font-size:11px;color:var(--muted);
  padding:3px 0;border-bottom:1px solid var(--border);line-height:1.4
}
.feed-item:last-child{border-bottom:none}
.feed-item .who{color:var(--accent2)}
.feed-item .action-done{color:#7dcc50}
.feed-item .action-undo{color:#cc7050}
.feed-empty{font-family:var(--mono);font-size:11px;color:var(--border2);padding:4px 0;text-align:center}

/* Header */
.header{text-align:center;margin-bottom:2rem;padding:2rem 0 1rem}
.header-tag{font-family:var(--mono);font-size:12px;color:var(--accent2);letter-spacing:3px;text-transform:uppercase;margin-bottom:.75rem;opacity:.8}
.header h1{font-size:clamp(2rem,5vw,3.2rem);font-weight:700;letter-spacing:2px;text-transform:uppercase;line-height:1}
.header h1 span{color:var(--accent)}
.header-sub{font-size:15px;color:var(--muted);margin-top:.75rem;font-weight:400}
.scanline{height:2px;background:linear-gradient(90deg,transparent,var(--accent),transparent);margin:1.5rem 0;opacity:.4}

/* Stats */
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:1.5rem}
.stat{background:var(--bg3);border:1px solid var(--border2);border-top:2px solid var(--accent);padding:1rem;text-align:center}
.stat-n{font-size:2rem;font-weight:700;color:var(--accent);font-family:var(--mono);line-height:1}
.stat-l{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:2px;margin-top:4px}
.global-prog{margin-bottom:1.5rem}
.prog-label{display:flex;justify-content:space-between;font-family:var(--mono);font-size:12px;color:var(--muted);margin-bottom:6px}
.prog-track{height:6px;background:var(--bg4);border:1px solid var(--border)}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));transition:width .5s cubic-bezier(.4,0,.2,1);width:0%}

/* Filters */
.toolbar{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;margin-bottom:1rem}
.filters{display:flex;flex-wrap:wrap;gap:8px}
.filt-btn{
  background:transparent;border:1px solid var(--border2);
  color:var(--muted);font-family:var(--font);font-size:13px;font-weight:600;
  padding:6px 16px;letter-spacing:1px;text-transform:uppercase;cursor:pointer;transition:all .2s
}
.filt-btn:hover{border-color:var(--accent);color:var(--text)}
.filt-btn.active{border-color:var(--accent);color:var(--accent);background:var(--bg3)}
.reset-btn{
  background:transparent;border:1px solid #ff334422;color:#ff3344;
  font-family:var(--font);font-size:12px;font-weight:600;letter-spacing:2px;
  text-transform:uppercase;padding:6px 16px;cursor:pointer;transition:all .2s
}
.reset-btn:hover{background:#ff334411;border-color:#ff334488}

/* Categories */
.cat{margin-bottom:1rem;border:1px solid var(--border)}
.cat-head{
  display:flex;align-items:center;justify-content:space-between;
  padding:.85rem 1.2rem;background:var(--bg2);cursor:pointer;
  border-left:3px solid var(--cat-color,var(--accent));transition:background .2s;gap:12px
}
.cat-head:hover{background:var(--bg3)}
.cat-icon{font-size:1.1rem;width:24px;text-align:center;flex-shrink:0}
.cat-name{font-size:15px;font-weight:700;letter-spacing:1px;text-transform:uppercase;flex:1}
.cat-right{display:flex;align-items:center;gap:12px}
.cat-count{font-family:var(--mono);font-size:12px;color:var(--muted)}
.cat-count.complete{color:var(--accent2)}
.cat-arrow{font-size:12px;color:var(--muted);transition:transform .3s}
.cat.open .cat-arrow{transform:rotate(180deg)}
.cat-pbar{height:3px;background:var(--bg4)}
.cat-pfill{height:100%;transition:width .4s;background:var(--cat-color,var(--accent));opacity:.7;width:0%}
.items{display:none}
.cat.open .items{display:block}
.item{
  display:flex;align-items:flex-start;gap:12px;padding:.7rem 1.2rem;
  border-top:1px solid var(--border);cursor:pointer;transition:background .15s;
  border-left:3px solid transparent;position:relative
}
.item:hover{background:var(--bg3);border-left-color:var(--cat-color,var(--accent))}
.item.done{opacity:.65}
.item.done .itxt{text-decoration:line-through;color:var(--muted)}
.cb{
  width:20px;height:20px;border:1px solid var(--border2);flex-shrink:0;margin-top:1px;
  display:flex;align-items:center;justify-content:center;transition:all .2s;background:var(--bg4)
}
.cb.chk{background:var(--cat-color,var(--accent));border-color:var(--cat-color,var(--accent))}
.cb svg{opacity:0;transition:opacity .2s}
.cb.chk svg{opacity:1}
.itxt{font-size:14px;font-weight:600;letter-spacing:.3px;line-height:1.4;flex:1}
.isub{font-size:12px;color:var(--muted);margin-top:3px;font-weight:400;font-family:var(--mono)}
.item-who{font-family:var(--mono);font-size:10px;color:var(--accent);margin-top:3px}

::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--border2)}

/* Pulse animation for live updates */
@keyframes pulse{0%{opacity:1}50%{opacity:.4}100%{opacity:1}}
.item.updating{animation:pulse .4s ease}
</style>
</head>

// State
let myName = localStorage.getItem("rp_name") || "";
let myId = localStorage.getItem("rp_uid") || ("u_"+Math.random().toString(36).slice(2,9));
localStorage.setItem("rp_uid", myId);
let state = {};
let onlineUsers = {};
let filter = "all";
let openCats = new Set(CATS.map(c=>c.id));
let feedItems = [];
let isSetup = !myName;

// Firebase refs
const checkRef  = db.ref("checks");
const usersRef  = db.ref("presence");
const feedRef   = db.ref("feed");

// Connection status
db.ref(".info/connected").on("value", snap => {
  const bar = document.getElementById("conn-bar");
  const txt = document.getElementById("conn-txt");
  if(snap.val()){
    bar.className = "conn-bar online";
    txt.textContent = "SINCRONIZADO EN TIEMPO REAL";
    if(myName) registerPresence();
  } else {
    bar.className = "conn-bar offline";
    txt.textContent = "SIN CONEXIÓN — REINTENTANDO...";
  }
});

function registerPresence(){
  const ref = usersRef.child(myId);
  ref.set({name: myName, id: myId, t: Date.now()});
  ref.onDisconnect().remove();
}

function initName(){
  const setup = document.getElementById("name-setup");
  const onlineBar = document.getElementById("online-bar");
  if(!isSetup){
    setup.style.display = "none";
    onlineBar.style.display = "flex";
    registerPresence();
    startListeners();
  }
  document.getElementById("name-btn").addEventListener("click", submitName);
  document.getElementById("name-input").addEventListener("keydown", e=>{ if(e.key==="Enter") submitName(); });
}

function submitName(){
  const val = document.getElementById("name-input").value.trim();
  if(!val) return;
  myName = val;
  localStorage.setItem("rp_name", myName);
  isSetup = false;
  document.getElementById("name-setup").style.display = "none";
  document.getElementById("online-bar").style.display = "flex";
  registerPresence();
  startListeners();
}

function startListeners(){
  // Listen to checks
  checkRef.on("value", snap => {
    state = snap.val() || {};
    render();
  });

  // Listen to presence
  usersRef.on("value", snap => {
    onlineUsers = snap.val() || {};
    renderAvatars();
  });

  // Listen to feed
  feedRef.limitToLast(20).on("value", snap => {
    const data = snap.val() || {};
    feedItems = Object.values(data).sort((a,b)=>b.t-a.t);
    renderFeed();
  });
}

function toggleItem(k, label){
  const cur = !!(state[k] && state[k].done);
  const newVal = !cur;
  checkRef.child(k).set(newVal ? {done:true, who:myName, t:Date.now()} : null);
  // Add to feed
  feedRef.push({
    who: myName,
    label: label,
    done: newVal,
    t: Date.now()
  });
  // Trim feed to last 50
  feedRef.once("value", snap => {
    const keys = Object.keys(snap.val()||{});
    if(keys.length > 50){
      keys.slice(0, keys.length-50).forEach(k => feedRef.child(k).remove());
    }
  });
}

function resetAll(){
  if(!confirm("¿Reiniciar todas las pruebas? Esto afecta a TODOS los usuarios.")) return;
  checkRef.set(null);
  feedRef.push({who:myName, label:"⚠️ REINICIO COMPLETO", done:false, t:Date.now(), reset:true});
}

function renderAvatars(){
  const wrap = document.getElementById("avatars");
  wrap.innerHTML = "";
  Object.values(onlineUsers).forEach(u => {
    const div = document.createElement("div");
    div.className = "avatar";
    div.setAttribute("data-you", u.id === myId ? "true":"false");
    div.title = u.name;
    div.textContent = u.name.slice(0,2).toUpperCase();
    wrap.appendChild(div);
  });
}

function renderFeed(){
  const feed = document.getElementById("feed");
  if(!feedItems.length){feed.innerHTML='<div class="feed-empty">— Sin actividad reciente —</div>';return;}
  feed.innerHTML = feedItems.slice(0,15).map(f=>{
    const time = new Date(f.t).toLocaleTimeString("es",{hour:"2-digit",minute:"2-digit"});
    if(f.reset) return `<div class="feed-item">[${time}] <span class="who">${f.who}</span> reinició toda la checklist</div>`;
    const cls = f.done?"action-done":"action-undo";
    const verb = f.done?"✓ completó":"↩ desmarcó";
    return `<div class="feed-item">[${time}] <span class="who">${f.who}</span> <span class="${cls}">${verb}</span>: ${f.label}</div>`;
  }).join("");
}

function updateStats(){
  let total=0, done=0;
  CATS.forEach(c=>c.items.forEach(i=>{
    total++;
    if(state[c.id+"__"+i.t.replace(/\s/g,"_")] && state[c.id+"__"+i.t.replace(/\s/g,"_")].done) done++;
  }));
  document.getElementById("s-total").textContent=total;
  document.getElementById("s-done").textContent=done;
  const pct=total?Math.round(done/total*100):0;
  document.getElementById("s-pct").textContent=pct+"%";
  document.getElementById("s-left").textContent=total-done;
  document.getElementById("prog-fill").style.width=pct+"%";
  document.getElementById("prog-txt").textContent=done+" / "+total;
}

function getKey(catId, itemT){
  return catId+"__"+itemT.replace(/[\s\/\.\(\)\*]/g,"_");
}

function render(){
  const wrap = document.getElementById("cats");
  wrap.innerHTML = "";
  CATS.forEach(cat=>{
    const total = cat.items.length;
    const done = cat.items.filter(i=>{ const k=getKey(cat.id,i.t); return state[k]&&state[k].done; }).length;
    const pct = Math.round(done/total*100);
    const visible = cat.items.filter(i=>{
      const d = !!(state[getKey(cat.id,i.t)]&&state[getKey(cat.id,i.t)].done);
      return filter==="all"||(filter==="done"&&d)||(filter==="pending"&&!d);
    });
    if(visible.length===0) return;
    const isOpen = openCats.has(cat.id);
    const div = document.createElement("div");
    div.className = "cat"+(isOpen?" open":"");
    div.style.setProperty("--cat-color",cat.color);
    div.innerHTML=`<div class="cat-head" data-cat="${cat.id}">
      <span class="cat-icon">${cat.icon}</span>
      <span class="cat-name">${cat.label}</span>
      <div class="cat-right">
        <span class="cat-count${done===total?" complete":""}">${done}/${total} (${pct}%)</span>
        <span class="cat-arrow">▼</span>
      </div>
    </div>
    <div class="cat-pbar"><div class="cat-pfill" style="width:${pct}%"></div></div>
    <div class="items">${visible.map(i=>{
      const k = getKey(cat.id,i.t);
      const entry = state[k];
      const chk = !!(entry&&entry.done);
      const who = entry&&entry.who ? entry.who : "";
      return `<div class="item${chk?" done":""}" data-k="${k}" data-label="${i.t}">
        <div class="cb${chk?" chk":""}">
          <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
            <path d="M2 6L5 9L10 3" stroke="#0a0900" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
        <div style="flex:1">
          <div class="itxt">${i.t}</div>
          <div class="isub">${i.s}</div>
          ${who?`<div class="item-who">✓ ${who}</div>`:""}
        </div>
      </div>`;
    }).join("")}</div>`;
    wrap.appendChild(div);
  });
  updateStats();
}

// Events
document.getElementById("cats").addEventListener("click", e=>{
  if(isSetup) return;
  const head = e.target.closest(".cat-head");
  if(head){
    const id = head.dataset.cat;
    const catEl = head.closest(".cat");
    if(openCats.has(id)){openCats.delete(id);catEl.classList.remove("open")}
    else{openCats.add(id);catEl.classList.add("open")}
    return;
  }
  const item = e.target.closest(".item");
  if(item){
    toggleItem(item.dataset.k, item.dataset.label);
  }
});

document.querySelector(".filters").addEventListener("click", e=>{
  const btn = e.target.closest(".filt-btn");
  if(!btn) return;
  document.querySelectorAll(".filt-btn").forEach(b=>b.classList.remove("active"));
  btn.classList.add("active");
  filter = btn.dataset.f;
  render();
});

document.getElementById("reset-btn").addEventListener("click", resetAll);

// Init
if(myName){
  document.getElementById("name-setup").style.display = "none";
  document.getElementById("online-bar").style.display = "flex";
  isSetup = false;
  startListeners();
}
initName();
render();
</script>
</body>
</html>
